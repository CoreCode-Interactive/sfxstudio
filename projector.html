<!DOCTYPE html>
<html>
<head>
    <title>Projector Output</title>
    <style>
        body { margin: 0; background: black; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #display-container { position: relative; width: 100%; height: 100%; }
        .media-item { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); max-width: 100%; max-height: 100%; object-fit: contain; opacity: 0; transition: opacity 1s; }
        .visible { opacity: 1; }
    </style>
</head>
<body><div id="display-container"></div></body>
</html>
